<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新北市垃圾車倒數 🚛</title>
<meta name="description" content="新北市垃圾車還有多久到？選你家附近的清運點，即時倒數＋每週時刻表，一鍵加入手機日曆提醒。">
<style>
  :root {
    --bg: #10151f; --card: #1a2230; --card2: #202b3d;
    --text: #eaf0f8; --muted: #8fa1bb; --line: #2c3a52;
    --green: #5ad8a6; --yellow: #ffd166; --pink: #ff7d94; --blue: #6cb2ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse 70% 40% at 50% -5%, #1e2c45 0%, transparent 60%);
    color: var(--text); min-height: 100vh; padding: 24px 16px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 22px; }
  h1 { font-size: 1.6rem; }
  header p { color: var(--muted); font-size: .9rem; margin-top: 6px; }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
  label { display: block; font-size: .82rem; color: var(--muted); margin: 10px 0 4px; }
  select, input[type=search] {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card2); color: var(--text); font-size: 1rem; font-family: inherit;
  }
  .stops { max-height: 300px; overflow-y: auto; margin-top: 10px; }
  .stop-item {
    padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: .92rem;
    display: flex; justify-content: space-between; gap: 8px; align-items: baseline;
  }
  .stop-item:hover { background: var(--card2); }
  .stop-item.sel { background: rgba(90,216,166,.12); outline: 1px solid var(--green); }
  .stop-item .t { color: var(--yellow); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .stop-item .v { color: var(--muted); font-size: .8rem; }

  .result { background: linear-gradient(135deg, var(--card), var(--card2)); border: 1px solid var(--line); border-radius: 18px; padding: 22px 18px; text-align: center; }
  .result .sname { font-size: 1.15rem; font-weight: 700; }
  .result .route { color: var(--muted); font-size: .82rem; margin-top: 2px; }
  .next-label { margin-top: 14px; color: var(--green); font-size: .85rem; letter-spacing: 2px; }
  .big { font-size: 2rem; font-weight: 800; color: var(--yellow); margin: 6px 0; font-variant-numeric: tabular-nums; }
  .sub { color: var(--muted); font-size: .88rem; }
  .week { display: flex; gap: 5px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .day {
    width: 64px; padding: 7px 0 6px; border-radius: 10px; background: rgba(0,0,0,.25);
    border: 1px solid var(--line); font-size: .78rem; color: var(--muted);
  }
  .day b { display: block; color: var(--text); font-size: .85rem; margin-bottom: 3px; }
  .day .dot { font-size: .72rem; display: block; line-height: 1.5; }
  .g { color: var(--yellow); } .r { color: var(--blue); } .f { color: var(--pink); }
  .off { opacity: .35; }
  .btns { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    border: none; border-radius: 999px; padding: 10px 20px; font-size: .92rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn.cal { background: var(--green); color: #06281a; }
  .btn.map { background: var(--card2); color: var(--text); border: 1px solid var(--line); }
  .btn:active { transform: scale(.97); }
  .legend { margin-top: 10px; font-size: .75rem; color: var(--muted); }
  .hint { text-align: center; color: var(--muted); font-size: .9rem; padding: 30px 0; }
  .notice {
    background: rgba(255,209,102,.1); border: 1px solid rgba(255,209,102,.35);
    border-radius: 12px; padding: 10px 14px; font-size: .84rem; margin-bottom: 14px;
    color: var(--yellow); text-align: center;
  }
  .notice a { color: var(--yellow); font-weight: 700; }
  .btn.geo { background: var(--blue); color: #04182e; width: 100%; margin-top: 10px; }
  .btn.fav { background: var(--card2); color: var(--yellow); border: 1px solid var(--line); }
  .fav-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: .9rem; }
  .fav-item:hover { background: var(--card2); }
  .fav-item .x { color: var(--muted); padding: 0 6px; cursor: pointer; }
  .dist { color: var(--blue); font-size: .78rem; white-space: nowrap; }
  footer { text-align: center; margin-top: 32px; color: var(--muted); font-size: .76rem; line-height: 1.8; }
  footer a { color: var(--blue); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🚛 新北市垃圾車倒數</h1>
    <p>選你家附近的清運點，倒數垃圾車抵達時間，一鍵加進手機日曆。</p>
  </header>

  <div class="notice">⚠️ 颱風或天災可能停收，出門前先看 <a href="https://crd-rubbish.epd.ntpc.gov.tw/dispPageBox/Ntpcepd/NtpIndex.aspx?ddsPageID=EPDNEWS" target="_blank" rel="noopener">環保局公告</a></div>

  <div class="panel" id="favPanel" style="display:none">
    <label>⭐ 我的常用站點</label>
    <div id="favList"></div>
  </div>

  <div class="panel">
    <label for="city">行政區</label>
    <select id="city"><option>載入中⋯</option></select>
    <button class="btn geo" id="geoBtn">📍 找我附近的站點</button>
    <label for="village">里別</label>
    <select id="village" disabled><option>先選行政區</option></select>
    <label for="q">搜尋站點（路名、地標）</label>
    <input type="search" id="q" placeholder="例如：中山路、公園、7-11⋯" disabled>
    <div class="stops" id="stops"></div>
  </div>

  <div id="detail"></div>

  <footer>
    資料來源：<a href="https://data.ntpc.gov.tw/datasets/edc3ad26-8ae7-4916-a00b-bc6048d19bf8" target="_blank" rel="noopener">新北市資料開放平臺「新北市垃圾車路線」</a>（每月自動更新）<br>
    <span id="updated"></span>表定時間僅供參考，實際以現場為準。國定假日（如春節）通常停收，請留意環保局公告。
  </footer>
</div>

<script>
const WD = ["日","一","二","三","四","五","六"];
const ICS_DAY = ["SU","MO","TU","WE","TH","FR","SA"];
let cityData = null, selStop = null, timer = null;

const $ = id => document.getElementById(id);
const tpeNow = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Taipei" }));

function parseHash() {
  try {
    const h = decodeURIComponent(location.hash.slice(1));
    if (!h) return null;
    const [city, village, stopKey] = h.split("~");
    return city ? { city, village, stopKey } : null;
  } catch { return null; }
}

async function init() {
  const idx = await (await fetch("data/index.json")).json();
  $("updated").textContent = `資料更新日：${idx.updated}・共 ${idx.total.toLocaleString()} 個清運點｜`;
  const citySel = $("city");
  citySel.innerHTML = '<option value="">請選擇</option>' +
    idx.cities.map(c => `<option value="${c.name}">${c.name}（${c.n.toLocaleString()} 點）</option>`).join("");
  renderFavs();
  // 網址 hash（可分享連結）優先，其次上次選擇
  const saved = parseHash() || JSON.parse(localStorage.getItem("ntpc-trash") || "{}");
  if (saved.city && [...citySel.options].some(o => o.value === saved.city)) {
    citySel.value = saved.city;
    await loadCity(saved.city, saved);
  }
  citySel.onchange = () => loadCity(citySel.value, {});
  $("geoBtn").onclick = geoLocate;
}

// ===== 定位找最近站點 =====
function geoLocate() {
  if (!$("city").value) { alert("請先選行政區，再用定位找該區最近的站點"); return; }
  if (!navigator.geolocation) { alert("你的瀏覽器不支援定位"); return; }
  $("geoBtn").textContent = "📍 定位中⋯";
  navigator.geolocation.getCurrentPosition(pos => {
    $("geoBtn").textContent = "📍 找我附近的站點";
    const { latitude: la, longitude: lo } = pos.coords;
    const dist = s => {
      const dx = (s[3] - lo) * 101000 * Math.cos(la * Math.PI / 180);
      const dy = (s[4] - la) * 110600;
      return Math.sqrt(dx * dx + dy * dy);
    };
    const nearest = [...cityData.stops].map(s => [dist(s), s]).sort((a, b) => a[0] - b[0]).slice(0, 20);
    $("village").value = "";
    $("q").value = "";
    const shown = nearest.map(n => n[1]);
    $("stops").innerHTML = nearest.map(([d, s], i) =>
      `<div class="stop-item" data-i="${i}">
        <span>${s[0]}<br><span class="v">${s[1]}・${s[8]}</span></span>
        <span><span class="dist">${d < 1000 ? Math.round(d) + " m" : (d/1000).toFixed(1) + " km"}</span> <span class="t">${s[2]}</span></span>
      </div>`).join("");
    [...$("stops").children].forEach(el => {
      if (el.dataset.i !== undefined) el.onclick = () => selectStop(shown[+el.dataset.i], el);
    });
  }, err => {
    $("geoBtn").textContent = "📍 找我附近的站點";
    alert("定位失敗：" + err.message);
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// ===== 常用站點（⭐ 收藏多個）=====
const getFavs = () => JSON.parse(localStorage.getItem("ntpc-trash-favs") || "[]");
function renderFavs() {
  const favs = getFavs();
  $("favPanel").style.display = favs.length ? "" : "none";
  $("favList").innerHTML = favs.map((f, i) =>
    `<div class="fav-item" data-i="${i}">
      <span>⭐ ${f.name}<span class="v">（${f.city}${f.village}）</span></span>
      <span class="x" data-x="${i}" title="移除">✕</span>
    </div>`).join("");
  [...$("favList").querySelectorAll(".fav-item")].forEach(el => {
    el.onclick = async e => {
      const i = +el.dataset.i;
      if (e.target.dataset.x !== undefined) {
        const favs = getFavs(); favs.splice(i, 1);
        localStorage.setItem("ntpc-trash-favs", JSON.stringify(favs));
        renderFavs(); return;
      }
      const f = getFavs()[i];
      $("city").value = f.city;
      await loadCity(f.city, { city: f.city, village: f.village, stopKey: f.stopKey });
    };
  });
}
function toggleFav() {
  const favs = getFavs();
  const key = stopKey(selStop);
  const i = favs.findIndex(f => f.stopKey === key && f.city === $("city").value);
  if (i >= 0) favs.splice(i, 1);
  else favs.push({ city: $("city").value, village: selStop[1], name: selStop[0], stopKey: key });
  localStorage.setItem("ntpc-trash-favs", JSON.stringify(favs));
  renderFavs();
  selectStop(selStop);
}

async function loadCity(city, saved) {
  if (!city) return;
  cityData = await (await fetch(`data/${encodeURIComponent(city)}.json`)).json();
  const villages = [...new Set(cityData.stops.map(s => s[1]))];
  const vSel = $("village");
  vSel.disabled = false;
  vSel.innerHTML = '<option value="">全部里</option>' + villages.map(v => `<option>${v}</option>`).join("");
  if (saved.village && villages.includes(saved.village)) vSel.value = saved.village;
  $("q").disabled = false;
  vSel.onchange = renderStops;
  $("q").oninput = renderStops;
  renderStops();
  if (saved.stopKey) {
    const s = cityData.stops.find(s => stopKey(s) === saved.stopKey);
    if (s) selectStop(s);
  }
}

const stopKey = s => s[0] + "|" + s[2] + "|" + s[8];

function renderStops() {
  const v = $("village").value, q = $("q").value.trim();
  let list = cityData.stops;
  if (v) list = list.filter(s => s[1] === v);
  if (q) list = list.filter(s => s[0].includes(q));
  const shown = list.slice(0, 200);
  $("stops").innerHTML = shown.map((s, i) =>
    `<div class="stop-item" data-i="${i}">
      <span>${s[0]}<br><span class="v">${s[1]}・${s[8]}</span></span>
      <span class="t">${s[2]}</span>
    </div>`).join("") +
    (list.length > 200 ? `<div class="hint">還有 ${list.length - 200} 筆，請用搜尋縮小範圍</div>` : "") +
    (list.length === 0 ? `<div class="hint">找不到站點 😢 換個關鍵字試試</div>` : "");
  [...$("stops").children].forEach(el => {
    if (el.dataset.i !== undefined) el.onclick = () => selectStop(shown[+el.dataset.i], el);
  });
}

// 找下一次收運：從今天起找 14 天內第一個有收的日子
function nextOccur(s, flagIdx) {
  const flags = s[flagIdx];
  const [hh, mm] = s[2].split(":").map(Number);
  const now = tpeNow();
  for (let d = 0; d < 14; d++) {
    const cand = new Date(now); cand.setDate(now.getDate() + d); cand.setHours(hh, mm, 0, 0);
    if (flags[cand.getDay()] === "1" && cand > now) return cand;
  }
  return null;
}

function selectStop(s, el) {
  selStop = s;
  document.querySelectorAll(".stop-item.sel").forEach(e => e.classList.remove("sel"));
  if (el) el.classList.add("sel");
  localStorage.setItem("ntpc-trash", JSON.stringify({ city: $("city").value, village: $("village").value, stopKey: stopKey(s) }));
  // 可分享網址
  history.replaceState(null, "", "#" + encodeURIComponent(`${$("city").value}~${s[1]}~${stopKey(s)}`));
  if (timer) clearInterval(timer);
  const render = () => {
    const nG = nextOccur(s, 5), nR = nextOccur(s, 6), nF = nextOccur(s, 7);
    const fmtD = t => !t ? "－" : `${t.getMonth()+1}/${t.getDate()}(${WD[t.getDay()]}) ${s[2]}`;
    const cd = t => {
      if (!t) return "此站點目前無收運資訊";
      const diff = t - tpeNow();
      const h = Math.floor(diff / 3600000), m = Math.floor(diff % 3600000 / 60000), sec = Math.floor(diff % 60000 / 1000);
      if (diff < 3600000) return `${m} 分 ${sec} 秒`;
      if (diff < 86400000) return `${h} 小時 ${m} 分`;
      return `${Math.floor(diff / 86400000)} 天 ${h % 24} 小時`;
    };
    $("detail").innerHTML = `
    <div class="result">
      <div class="sname">📍 ${s[0]}</div>
      <div class="route">${$("city").value}${s[1]}・${s[8]}・表定 ${s[2]}</div>
      <div class="next-label">下 一 班 垃 圾 車</div>
      <div class="big">${cd(nG)}</div>
      <div class="sub">🗑️ 垃圾 ${fmtD(nG)}｜♻️ 回收 ${fmtD(nR)}｜🥬 廚餘 ${fmtD(nF)}</div>
      <div class="week">${WD.map((w, i) => `
        <div class="day ${s[5][i]==="0" && s[6][i]==="0" && s[7][i]==="0" ? "off" : ""}">
          <b>${w}</b>
          <span class="dot g">${s[5][i]==="1" ? "🗑️" : "·"}</span>
          <span class="dot r">${s[6][i]==="1" ? "♻️" : "·"}</span>
          <span class="dot f">${s[7][i]==="1" ? "🥬" : "·"}</span>
        </div>`).join("")}
      </div>
      <div class="legend">🗑️ 一般垃圾　♻️ 資源回收　🥬 廚餘</div>
      <div class="btns">
        <button class="btn cal" onclick="downloadICS()">📅 加入日曆（每週提醒）</button>
        <button class="btn fav" onclick="toggleFav()">${getFavs().some(f => f.stopKey === stopKey(s) && f.city === $("city").value) ? "💔 移除常用" : "⭐ 加入常用"}</button>
        <button class="btn map" onclick="openMap()">🗺️ 地圖</button>
        <button class="btn map" onclick="shareLink()">🔗 分享</button>
      </div>
    </div>`;
  };
  render();
  timer = setInterval(render, 1000);
  $("detail").scrollIntoView({ behavior: "smooth", block: "start" });
}

function openMap() {
  window.open(`https://www.google.com/maps?q=${selStop[4]},${selStop[3]}`, "_blank");
}

async function shareLink() {
  const url = location.href;
  const text = `🚛 ${selStop[0]} 的垃圾車時間表`;
  if (navigator.share) { try { await navigator.share({ title: text, url }); } catch {} }
  else { await navigator.clipboard.writeText(url); alert("連結已複製！"); }
}

// ===== 產生 .ics（每週重複 + 提前 10 分鐘提醒）=====
function icsDate(t) {
  const p = n => String(n).padStart(2, "0");
  return `${t.getFullYear()}${p(t.getMonth()+1)}${p(t.getDate())}T${p(t.getHours())}${p(t.getMinutes())}00`;
}
function makeEvent(s, flagIdx, label, emoji) {
  const start = nextOccur(s, flagIdx);
  if (!start) return "";
  const days = [...s[flagIdx]].map((f, i) => f === "1" ? ICS_DAY[i] : null).filter(Boolean).join(",");
  const end = new Date(start.getTime() + 10 * 60000);
  return [
    "BEGIN:VEVENT",
    `UID:${stopKey(s).replace(/[^\w]/g, "")}-${flagIdx}@ntpc-trash`,
    `DTSTAMP:${icsDate(new Date())}Z`,
    `DTSTART;TZID=Asia/Taipei:${icsDate(start)}`,
    `DTEND;TZID=Asia/Taipei:${icsDate(end)}`,
    `RRULE:FREQ=WEEKLY;BYDAY=${days}`,
    `SUMMARY:${emoji} ${label}車來了－${s[0]}`,
    `LOCATION:${$("city").value}${s[1]} ${s[0]}`,
    `DESCRIPTION:表定時間 ${s[2]}（${s[8]}）\\n資料來源：新北市資料開放平臺`,
    "BEGIN:VALARM",
    "TRIGGER:-PT10M",
    "ACTION:DISPLAY",
    `DESCRIPTION:${emoji} ${label}車 10 分鐘後到 ${s[0]}`,
    "END:VALARM",
    "END:VEVENT"
  ].join("\r\n");
}
function downloadICS() {
  const s = selStop;
  const events = [makeEvent(s, 5, "垃圾", "🗑️"), makeEvent(s, 6, "資源回收", "♻️"), makeEvent(s, 7, "廚餘", "🥬")].filter(Boolean);
  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//ntpc-trash-countdown//TW",
    "CALSCALE:GREGORIAN",
    "BEGIN:VTIMEZONE", "TZID:Asia/Taipei",
    "BEGIN:STANDARD", "DTSTART:19700101T000000",
    "TZOFFSETFROM:+0800", "TZOFFSETTO:+0800", "TZNAME:CST",
    "END:STANDARD", "END:VTIMEZONE",
    ...events,
    "END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `垃圾車提醒-${s[0]}.ics`;
  a.click();
  URL.revokeObjectURL(a.href);
}

init().catch(e => {
  $("stops").innerHTML = `<div class="hint">資料載入失敗 😢（${e.message}）<br>如果是第一次部署，請先執行 GitHub Actions 抓資料</div>`;
});
</script>
</body>
</html>
